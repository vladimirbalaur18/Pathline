name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Ensure native build scripts
        run: pnpm rebuild esbuild

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build

      - name: Test with coverage
        run: pnpm test:coverage

  publish-dry-run:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm rebuild esbuild
      - run: pnpm build
      - name: Publish dry-run (core)
        run: pnpm --filter @pathline/core publish --dry-run --no-git-checks
      - name: Publish dry-run (nestjs)
        run: pnpm --filter @pathline/nestjs publish --dry-run --no-git-checks
